name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CSS
        run: |
          npm install
          npm run build:css

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Allow SSH and wait for propagation
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Runner IP: $RUNNER_IP"
          curl -sk "https://api.coreserver.jp/v1/tool/ssh_ip_allow" \
            -d "account=${{ secrets.SSH_USER }}" \
            -d "server_name=${{ secrets.SSH_HOST }}" \
            -d "api_secret_key=${{ secrets.CORESERVER_API_KEY }}" \
            -d "param[addr]=$RUNNER_IP"
          echo ""
          echo "Waiting for SSH access..."
          for i in $(seq 1 20); do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o IdentitiesOnly=yes -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo ok" 2>/dev/null; then
              echo "SSH connection established after attempt $i"
              exit 0
            fi
            echo "Attempt $i/20 failed, retrying in 15s..."
            sleep 15
          done
          echo "SSH connection failed after 20 attempts"
          exit 1

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='var/cache/' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='src/css' \
            --exclude='docker' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}
