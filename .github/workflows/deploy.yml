name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CSS
        run: |
          npm install
          npm run build:css

      - name: Allow SSH from this runner
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Runner IP: $RUNNER_IP"
          curl -sk "https://api.coreserver.jp/v1/tool/ssh_ip_allow" \
            -d "account=${{ secrets.SSH_USER }}" \
            -d "server_name=${{ secrets.SSH_HOST }}" \
            -d "api_secret_key=${{ secrets.CORESERVER_API_KEY }}" \
            -d "param[addr]=$RUNNER_IP"
          echo ""
          echo "Waiting for SSH allowlist propagation..."
          sleep 60

      - name: Deploy via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='var/cache/' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='src/css' \
            --exclude='docker' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}
